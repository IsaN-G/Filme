    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: #ad0ff7;
            padding: 20px;
            font-weight: bolder;
        }

        .row {
            display: flex;
            margin-bottom: 30px;
        }

      
        .movie {
            margin: 10px;
            text-align: center;
            width: 200px;
            border: 2px solid rgb(91, 76, 230); /* Weiße Umrandung */
            border-radius: 10px;
            padding: 10px;
            box-sizing: border-box;
            transition: transform 0.2s ease;
        }

        .movie:hover {
            transform: scale(1.05);
            border-color: #e908e9;
        } 
          
        img {
            width: 100%;
            border-radius: 10px;
        }
    </style>
</head>
