<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header class="hero">
        <div class="video-container">
          <div id="header-video"></div>
        </div>
        <button id="enable-sound" class="sound-toggle" title="Ton einschalten">
          <i class="fas fa-volume-mute"></i>
        </button>
      </header>

    <nav class="navbar">
        <h1 class="logo">NextView</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="🔎 Suche nach Filmen ..." />
            <button id="searchBtn" title="Suche"><i class="fas fa-search"></i></button>
            <i id="loader" class="fas fa-spinner fa-spin"></i>
        </div>
        <button class="login-btn">Login</button>
    </nav>

    <main>
        <h2 id="search-title">Suchergebnisse</h2>
        <div id="searchResults" class="row"></div>

        <h2 id="watchlist-title">🎬 Deine Watchlist</h2>
        <div id="watchlist" class="row"></div>
        
        <h2>Top 15</h2>
          <div class="top10-container">
            <button class="scroll-btn left">&#8249;</button>
            <div class="top10-row" id="topTenContainer">
          </div>
            <button class="scroll-btn right">&#8250;</button>
        </div>
        
        <section class="grid-section">
            <h2>Empfohlene Filme</h2>
            <div id="gridContainer" class="grid-container"></div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <p>&copy; 2025 MovieWorld. All rights reserved.</p>
            <div class="footer-links">
                <a href="#">Impressum</a>
                <a href="#">Datenschutz</a>
                <a href="#">Kontakt</a>
            </div>
        </div>
    </footer>


    <div id="modal" class="modal">
        <div class="modal-content">
          <span id="closeModal" class="close">&times;</span>
          <h2 id="modal-title"></h2>
          <img id="modal-poster" alt="Movie poster" />
          <p id="modal-year"></p>
          <p id="modal-genre"></p>
          <p id="modal-actors"></p>
          <p id="modal-plot"></p>
          
          <div id="modal-video-container" style="margin-top: 1rem; display: none;">
            <iframe id="modal-video" width="100%" height="315" frameborder="0" allowfullscreen></iframe>
          </div>
        </div>
      </div>
      <script src="https://www.youtube.com/iframe_api"></script>
    <script src="main.js"></script>
</body>
</html>
